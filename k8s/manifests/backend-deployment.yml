apiVersion: apps/v1
kind: Deployment
metadata:
  name: study-guide-backend
  namespace: study-guide
  labels:
    app: study-guide-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: study-guide-backend
  template:
    metadata:
      labels:
        app: study-guide-backend
    spec:
      containers:
      - name: backend
        image: study-guide-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: OLLAMA_URL
          value: "http://study-guide-ollama:11434"
        - name: OLLAMA_MODEL
          value: "llama3.2"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
